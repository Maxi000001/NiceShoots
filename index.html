<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NiceShoot</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="crosshair-container" id="crosshairContainer">
    <svg class="crosshair-active" id="crosshairActive" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line x1="24" y1="8" x2="24" y2="40" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="8" y1="24" x2="40" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="24" cy="24" r="2" fill="currentColor"/>
    </svg>
  </div>

  <button type="button" class="settings-toggle" id="settingsToggle" aria-label="Open settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>

  <aside class="settings-panel" id="settingsPanel">
    <header class="panel-header">
      <h2 class="panel-title">NiceShoot Config</h2>
      <div class="panel-header-actions">
        <button type="button" class="btn-reset btn-reset--header" id="resetBtn" aria-label="Reset to default">Reset</button>
        <button type="button" class="panel-close" id="panelClose" aria-label="Close settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </header>

    <div class="panel-content">
      <!-- Section 1: Style & Color -->
      <section class="panel-section">
        <h3 class="section-title">Style & Color</h3>
        <div class="crosshair-grid" role="group" aria-label="Crosshair shape">
          <button type="button" class="crosshair-option active" data-style="1" aria-pressed="true"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="3" fill="currentColor"/></svg></button>
          <button type="button" class="crosshair-option" data-style="2"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><line x1="24" y1="6" x2="24" y2="42"/><line x1="6" y1="24" x2="42" y2="24"/></svg></button>
          <button type="button" class="crosshair-option" data-style="3"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="16"/></svg></button>
          <button type="button" class="crosshair-option" data-style="4"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="16"/><circle cx="24" cy="24" r="3" fill="currentColor"/></svg></button>
          <button type="button" class="crosshair-option" data-style="5"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><line x1="24" y1="6" x2="24" y2="28"/><line x1="10" y1="24" x2="38" y2="24"/></svg></button>
          <button type="button" class="crosshair-option" data-style="6"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><path d="M24 12 L16 28 L32 28 Z" stroke-linejoin="round"/></svg></button>
          <button type="button" class="crosshair-option" data-style="7"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><line x1="24" y1="4" x2="24" y2="18"/><line x1="24" y1="30" x2="24" y2="44"/><line x1="4" y1="24" x2="18" y2="24"/><line x1="30" y1="24" x2="44" y2="24"/><rect x="20" y="20" width="8" height="8" rx="1" stroke="currentColor" fill="none"/></svg></button>
          <button type="button" class="crosshair-option" data-style="8"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="24" r="18"/><circle cx="24" cy="24" r="10"/></svg></button>
          <button type="button" class="crosshair-option" data-style="9"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><rect x="14" y="14" width="20" height="20" rx="2"/><circle cx="24" cy="24" r="3" fill="currentColor"/></svg></button>
          <button type="button" class="crosshair-option" data-style="10"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="12" x2="36" y2="36"/><line x1="36" y1="12" x2="12" y2="36"/></svg></button>
          <button type="button" class="crosshair-option" data-style="11"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><circle cx="24" cy="14" r="3" fill="currentColor"/><circle cx="24" cy="24" r="3" fill="currentColor"/><circle cx="24" cy="34" r="3" fill="currentColor"/></svg></button>
          <button type="button" class="crosshair-option" data-style="12"><svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2"><line x1="24" y1="6" x2="24" y2="14"/><line x1="24" y1="34" x2="24" y2="42"/><line x1="6" y1="24" x2="14" y2="24"/><line x1="34" y1="24" x2="42" y2="24"/><line x1="10" y1="10" x2="16" y2="16"/><line x1="32" y1="32" x2="38" y2="38"/><line x1="32" y1="10" x2="38" y2="16"/><line x1="10" y1="32" x2="16" y2="38"/><circle cx="24" cy="24" r="3" fill="currentColor"/></svg></button>
        </div>
        <div class="control-group control-group--compact">
          <span class="control-label">Primary Color</span>
          <div class="color-row">
            <input type="color" id="crosshairColor" class="color-picker color-picker--sm" value="#00FF00" aria-label="Primary color">
            <div class="color-presets">
              <button type="button" class="color-preset" data-color="#00f0ff" style="--preset-color:#00f0ff" aria-label="Cyan"></button>
              <button type="button" class="color-preset" data-color="#00FF00" style="--preset-color:#00FF00" aria-label="Green"></button>
              <button type="button" class="color-preset" data-color="#b24bf3" style="--preset-color:#b24bf3" aria-label="Purple"></button>
              <button type="button" class="color-preset" data-color="#ff3366" style="--preset-color:#ff3366" aria-label="Red"></button>
              <button type="button" class="color-preset" data-color="#ffff00" style="--preset-color:#ffff00" aria-label="Yellow"></button>
              <button type="button" class="color-preset" data-color="#ffffff" style="--preset-color:#ffffff" aria-label="White"></button>
            </div>
          </div>
        </div>
        <div class="control-group control-group--compact control-group--row">
          <label class="control-label" for="fillToggle">Show Body / Fill</label>
          <label class="toggle-switch">
            <input type="checkbox" id="fillToggle" checked aria-checked="true">
            <span class="toggle-track"></span>
          </label>
        </div>
      </section>

      <!-- Section 2: Dimensions -->
      <section class="panel-section">
        <h3 class="section-title">Dimensions</h3>
        <div class="control-group control-group--compact">
          <label class="control-label" for="crosshairSize">Size</label>
          <div class="slider-wrap slider-wrap--compact">
            <input type="range" id="crosshairSize" class="slider slider--compact" min="8" max="96" value="24">
            <span class="slider-value" id="sizeValue">24</span>
          </div>
        </div>
        <div class="control-group control-group--compact">
          <label class="control-label" for="crosshairThickness">Thickness</label>
          <div class="slider-wrap slider-wrap--compact">
            <input type="range" id="crosshairThickness" class="slider slider--compact" min="1" max="10" value="2">
            <span class="slider-value" id="thicknessValue">2</span>
          </div>
        </div>
        <div class="control-group control-group--compact">
          <label class="control-label" for="crosshairOpacity">Opacity</label>
          <div class="slider-wrap slider-wrap--compact">
            <input type="range" id="crosshairOpacity" class="slider slider--compact" min="0" max="100" value="100">
            <span class="slider-value" id="opacityValue">100%</span>
          </div>
        </div>
      </section>

      <!-- Section 3: Outline (collapsible) -->
      <details class="accordion">
        <summary class="accordion-trigger">
          <span>Outline</span>
          <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="accordion-body">
          <div class="accordion-inner">
            <div class="control-group control-group--compact control-group--row">
              <label class="control-label" for="outlineToggle">Enable Outline</label>
              <label class="toggle-switch">
                <input type="checkbox" id="outlineToggle" aria-checked="false">
                <span class="toggle-track"></span>
              </label>
            </div>
            <div class="control-group control-group--compact">
              <label class="control-label" for="outlineColor">Outline Color</label>
              <input type="color" id="outlineColor" class="color-picker color-picker--sm" value="#000000" aria-label="Outline color">
            </div>
            <div class="control-group control-group--compact">
              <label class="control-label" for="outlineThickness">Outline Thickness</label>
              <div class="slider-wrap slider-wrap--compact">
                <input type="range" id="outlineThickness" class="slider slider--compact" min="0" max="5" value="1">
                <span class="slider-value" id="outlineThicknessValue">1</span>
              </div>
            </div>
          </div>
        </div>
      </details>

      <!-- Section 4: Effects FX (collapsible) -->
      <details class="accordion">
        <summary class="accordion-trigger">
          <span>Effects (FX)</span>
          <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="accordion-body">
          <div class="accordion-inner">
            <div class="control-group control-group--compact control-group--row">
              <label class="control-label" for="glowToggle">Enable Glow</label>
              <label class="toggle-switch">
                <input type="checkbox" id="glowToggle" aria-checked="false">
                <span class="toggle-track"></span>
              </label>
            </div>
            <div class="control-group control-group--compact">
              <label class="control-label" for="glowColor">Glow Color</label>
              <input type="color" id="glowColor" class="color-picker color-picker--sm" value="#00FF00" aria-label="Glow color">
            </div>
            <div class="control-group control-group--compact">
              <label class="control-label" for="glowIntensity">Glow Intensity</label>
              <div class="slider-wrap slider-wrap--compact">
                <input type="range" id="glowIntensity" class="slider slider--compact" min="0" max="20" value="8">
                <span class="slider-value" id="glowIntensityValue">8</span>
              </div>
            </div>
          </div>
        </div>
      </details>

      <!-- Section 5: Position (collapsible) -->
      <details class="accordion">
        <summary class="accordion-trigger">
          <span>Position</span>
          <svg class="accordion-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </summary>
        <div class="accordion-body">
          <div class="accordion-inner">
            <div class="control-group control-group--compact">
              <label class="control-label" for="positionX">X Offset</label>
              <div class="slider-wrap slider-wrap--compact">
                <input type="range" id="positionX" class="slider slider--compact" min="-100" max="100" value="0">
                <span class="slider-value" id="positionXValue">0</span>
              </div>
            </div>
            <div class="control-group control-group--compact">
              <label class="control-label" for="crosshairYOffset">Y Offset</label>
              <div class="slider-wrap slider-wrap--compact">
                <input type="range" id="crosshairYOffset" class="slider slider--compact" min="-100" max="100" value="0">
                <span class="slider-value" id="yOffsetValue">0</span>
              </div>
            </div>
            <button type="button" class="btn-center" id="centerBtn" aria-label="Center crosshair">Center</button>
          </div>
        </div>
      </details>

      <div class="panel-footer">
        <button type="button" class="btn-exit" id="quitBtn" aria-label="Exit NiceShoot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
          <span>Exit NiceShoot</span>
        </button>
      </div>
    </div>
  </aside>

  <script src="renderer.js" defer></script>
</body>
</html>
